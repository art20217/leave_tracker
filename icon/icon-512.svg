                            <!-- Horizontal Lines -->
                            <line x1="80" y1="195" x2="432" y2="195"/>
                            <line x1="80" y1="270" x2="432" y2="270"/>
                            <line x1="80" y1="345" x2="432" y2="345"/>
                            <!-- Vertical Lines -->
                            <line x1="168" y1="195" x2="168" y2="432"/>
                            <line x1="256" y1="195" x2="256" y2="432"/>
                            <line x1="344" y1="195" x2="344" y2="432"/>
                        </g>

                        <!-- Top Pegs -->
                        <rect x="150" y="70" width="24" height="90" rx="12" fill="#0056D2"/>
                        <rect x="338" y="70" width="24" height="90" rx="12" fill="#0056D2"/>
                        
                        <!-- Green Checkmark (Layered ABOVE grids) -->
                        <path d="M180 310L240 370L350 240" stroke="#28A745" stroke-width="45" stroke-linecap="round" stroke-linejoin="round"/>
                        
