<style>
  *{box-sizing:border-box;margin:0;padding:0;}
  html,body{width:100%;height:100%;overflow:hidden;}
  body{font-family:'Inter','Noto Sans TC',-apple-system,sans-serif;background:#05050a;color:#fff;-webkit-font-smoothing:antialiased;text-rendering:optimizeLegibility;}
  #root{width:100%;height:100%;}
  .stage{position:fixed;inset:0;display:flex;align-items:center;justify-content:center;overflow:hidden;background:var(--stage-bg,radial-gradient(ellipse at 20% 0%,#1a1440 0%,transparent 55%),radial-gradient(ellipse at 80% 100%,#0a2a35 0%,transparent 55%),#05050a);transition:background .6s ease;}
  .stage::before{content:'';position:absolute;inset:-20%;background:var(--stage-glow,radial-gradient(circle at 30% 30%,rgba(124,77,255,.25),transparent 40%),radial-gradient(circle at 70% 70%,rgba(77,220,200,.18),transparent 40%));filter:blur(40px);pointer-events:none;transition:background .6s ease;}
  .stage::after{content:'';position:absolute;inset:0;background-image:linear-gradient(rgba(255,255,255,.03) 1px,transparent 1px),linear-gradient(90deg,rgba(255,255,255,.03) 1px,transparent 1px);background-size:48px 48px;mask-image:radial-gradient(circle at 50% 50%,black 0%,transparent 70%);-webkit-mask-image:radial-gradient(circle at 50% 50%,black 0%,transparent 70%);pointer-events:none;opacity:.5;}
  .phone-scroll::-webkit-scrollbar{width:0;height:0;}
  .phone-scroll{scrollbar-width:none;}
  .glass{position:relative;background:rgba(255,255,255,.04);border:1px solid rgba(255,255,255,.08);backdrop-filter:blur(24px) saturate(140%);-webkit-backdrop-filter:blur(24px) saturate(140%);border-radius:20px;overflow:hidden;}
  .glass::before{content:'';position:absolute;inset:0;border-radius:inherit;pointer-events:none;background:linear-gradient(135deg,rgba(255,255,255,.08) 0%,transparent 45%);}
  @keyframes fadeIn{from{opacity:0;transform:translateY(8px);}to{opacity:1;transform:none;}}
  @keyframes slideIn{from{opacity:0;transform:translateX(12px);}to{opacity:1;transform:none;}}
  @keyframes scaleIn{from{opacity:0;transform:scale(.96);}to{opacity:1;transform:scale(1);}}
  .fade-in{animation:fadeIn .45s cubic-bezier(.2,.7,.2,1) both;}
  .scale-in{animation:scaleIn .4s cubic-bezier(.2,.7,.2,1) both;}
  .slide-in{animation:slideIn .35s cubic-bezier(.2,.7,.2,1) both;}
  .mono{font-family:'Inter',monospace;font-variant-numeric:tabular-nums;}
  input[type="date"],input[type="number"],input[type="text"],select{font-family:inherit;background:rgba(255,255,255,.05);color:#fff;border:1px solid rgba(255,255,255,.1);padding:10px 12px;border-radius:10px;font-size:14px;outline:none;width:100%;transition:border-color .15s,background .15s;}
  input:focus,select:focus{border-color:var(--accent,#7c4dff);background:rgba(255,255,255,.08);}
  input[type="date"]{color-scheme:dark;}
  select option{background:#1a1a2e;color:#fff;}
  button{font-family:inherit;}
  .hint{font-size:12px;color:rgba(255,255,255,.45);}
  .hint.warn{color:#ff6b8a;}

// === data.jsx ===
// data.jsx — calculations + mock data
function f1(n){return parseFloat((n||0).toFixed(1));}
function fDH(h){
  const d=Math.floor(h/8);
  const r=Math.round((h-d*8)*10)/10;
  if(d>0 && r>0) return `${d} 天 ${r} 小時`;
  if(d>0) return `${d} 天`;
  if(r>0) return `${r} 小時`;
  return '0 天';
}
function toHours(days,hours){return (parseFloat(days)||0)*8+(parseFloat(hours)||0);}
function fmtDate(d){return `${d.getFullYear()}/${d.getMonth()+1}/${d.getDate()}`;}

function getLegalDays(totalMonths){
  if(totalMonths<6) return 0;
  if(totalMonths<12) return 3;
  const y=Math.floor(totalMonths/12);
  if(y<2) return 7;
  if(y<3) return 10;
  if(y<5) return 14;
  if(y<10) return 15;
  return Math.min(16+(y-10),30);
}
function diffWholeMonths(from,to){
  let y=to.getFullYear()-from.getFullYear();
  let m=to.getMonth()-from.getMonth();
  const d=to.getDate()-from.getDate();
  let total=y*12+m;
  if(d<0) total--;
  return total;
}
function molFormula(Mfrac,oldDays,newDays){
  const denom=(oldDays===3)?6:12;
  const front=(Mfrac/denom)*oldDays;
  const back=newDays-(Mfrac/12)*newDays;
  return Math.round((front+back)*10)/10;
}

function calcHistorical(hireDateStr){
  if(!hireDateStr) return {totalDays:0, lines:[]};
  const hireDate=new Date(hireDateStr+'T00:00:00');
  const today=new Date(); today.setHours(0,0,0,0);
  if(hireDate>today) return {totalDays:0, lines:['到職日不可為未來日期'], warn:true};
  const thisYear=today.getFullYear();
  const jan1=new Date(thisYear,0,1);
  const dec31=new Date(thisYear,11,31);
  let lines=[], totalDays=0;

  if(hireDate>=jan1){
    const sixMo=new Date(hireDate); sixMo.setMonth(sixMo.getMonth()+6);
    if(sixMo<=dec31){
      const mToSix=diffWholeMonths(jan1,sixMo);
      const dRem=sixMo.getDate()-1;
      const dInMo=new Date(sixMo.getFullYear(),sixMo.getMonth()+1,0).getDate();
      const Mfrac=mToSix+dRem/dInMo;
      const seg=Math.round((3-(Mfrac/6)*3)*10)/10;
      totalDays=seg;
      lines.push(`到職年：滿 6 個月後（${fmtDate(sixMo)}）至年底`);
      lines.push(`3 − (${mToSix}+${dRem}/${dInMo})/6 × 3 = ${seg} 天`);
    } else {
      lines.push('到職年底前未滿 6 個月，特休 0 天');
    }
  } else {
    const anniv=new Date(thisYear,hireDate.getMonth(),hireDate.getDate());
    const monthsAtJan1=diffWholeMonths(hireDate,jan1);
    const legalAtJan1=getLegalDays(monthsAtJan1);
    const monthsAtAnniv=diffWholeMonths(hireDate,anniv);
    const legalAtAnniv=getLegalDays(monthsAtAnniv);
    const hasUpgrade=(anniv>=jan1 && anniv<=dec31 && legalAtAnniv!==legalAtJan1);

    if(legalAtJan1===0 && !hasUpgrade){
      lines.push('年底前年資未滿 6 個月，特休 0 天');
    } else if(legalAtJan1===0 && hasUpgrade){
      const m2=diffWholeMonths(jan1,anniv);
      const dr=anniv.getDate()-1;
      const dm=new Date(anniv.getFullYear(),anniv.getMonth()+1,0).getDate();
      const Mfrac=m2+dr/dm;
      const seg=Math.round((3-(Mfrac/6)*3)*10)/10;
      totalDays=seg;
      lines.push(`年初未滿 6 個月，${fmtDate(anniv)} 滿 6 個月`);
      lines.push(`3 − (${m2}+${dr}/${dm})/6 × 3 = ${seg} 天`);
    } else if(hasUpgrade){
      const mToAnniv=diffWholeMonths(jan1,anniv);
      const dr=anniv.getDate()-1;
      const dm=new Date(anniv.getFullYear(),anniv.getMonth()+1,0).getDate();
      const Mfrac=mToAnniv+dr/dm;
      const result=molFormula(Mfrac,legalAtJan1,legalAtAnniv);
      totalDays=result;
      lines.push(`${fmtDate(anniv)} 進級（${legalAtJan1}→${legalAtAnniv} 天）`);
      lines.push(`前段 ${legalAtJan1}d × 年初比例 + 後段 ${legalAtAnniv}d × 剩餘 = ${result} 天`);
    } else {
      totalDays=legalAtJan1;
      const yy=Math.floor(monthsAtJan1/12), mm=monthsAtJan1%12;
      lines.push(`年資 ${yy} 年 ${mm} 個月，無進級`);
      lines.push(`法定天數 ${legalAtJan1} 天`);
    }
  }
  return {totalDays:f1(totalDays), lines};
}

// compact button
function GlassButton({ children, onClick, primary=false, style={} }) {
  return <button onClick={onClick} style={{
    border:'none', cursor:'pointer',
    padding:'12px 16px', borderRadius:14,
    fontSize:14, fontWeight:600,

  onMouseLeave={(e)=>{e.currentTarget.style.transform='none';}}
  >{children}</button>;

// Donut / ring progress
function Ring({ value=0, total=1, size=120, stroke=12, color='var(--chart-leave)', label, sub }) {
  const pct = total>0 ? Math.max(0, Math.min(1, value/total)) : 0;
  const r = (size-stroke)/2;
  const c = 2*Math.PI*r;
  return (
    <div style={{position:'relative', width:size, height:size, display:'flex', alignItems:'center', justifyContent:'center'}}>
      <svg width={size} height={size} style={{transform:'rotate(-90deg)'}}>
        <circle cx={size/2} cy={size/2} r={r} fill="none" stroke="rgba(255,255,255,.07)" strokeWidth={stroke}/>
        <circle cx={size/2} cy={size/2} r={r} fill="none" stroke={color} strokeWidth={stroke} strokeLinecap="round"
          strokeDasharray={c}
          strokeDashoffset={c*(1-pct)}
          style={{transition:'stroke-dashoffset .8s cubic-bezier(.2,.7,.2,1)', filter:`drop-shadow(0 0 8px ${color})`}}
        />
      </svg>
      <div style={{position:'absolute', textAlign:'center'}}>
        {label && <div className="mono" style={{fontSize:26, fontWeight:700, lineHeight:1}}>{label}</div>}
        {sub && <div style={{fontSize:10, color:'rgba(255,255,255,.5)', marginTop:4, letterSpacing:.5}}>{sub}</div>}
      </div>
    </div>
  );
}

            <div style={{display:'flex', alignItems:'baseline', gap:6, marginBottom:6}}>

        />
        <StatTile

            return (
              <div key={r.id} style={{
                display:'flex', alignItems:'center', gap:12, padding:'10px 12px',

              </div>
            );
          })}
        </div>
      </div>
    </div>
  );
}

function LeaveView({ state, setState }) {
  const { f1, toHours, calcHistorical } = DataUtil;
  const { leaveRecords, leaveTotal, hireDate } = state;
  const [form, setForm] = React.useState({date:'', type:'特休', days:'', hours:'', note:''});
  const [hint, setHint] = React.useState({text:'', warn:false});
  const [showFormula, setShowFormula] = React.useState(false);

  const annualH = leaveRecords.filter(r=>r.type==='特休').reduce((s,r)=>s+toHours(r.days,r.hours),0);
  const totalH  = leaveTotal*8;
  const remainH = Math.max(0,totalH-annualH);

  const calcResult = React.useMemo(()=>hireDate?calcHistorical(hireDate):null, [hireDate]);

  React.useEffect(()=>{
    if(calcResult && typeof calcResult.totalDays==='number' && !calcResult.warn){
      setState(s=> s.leaveTotal===calcResult.totalDays ? s : ({...s, leaveTotal: calcResult.totalDays}));
    }
  },[hireDate, calcResult && calcResult.totalDays]);

  const onAdd=()=>{
    const days = parseFloat(form.days)||0;
    const hours = parseFloat(form.hours)||0;
    if(!form.date){setHint({text:'請選擇日期',warn:true});return;}
    if(days===0 && hours===0){setHint({text:'天數或小時至少填一項',warn:true});return;}
    if(hours>=8){setHint({text:'小時需小於 8',warn:true});return;}
    const rec = {id:'l'+Date.now(), date:form.date, type:form.type, days, hours, note:form.note};
    setState(s=>({...s, leaveRecords:[rec,...s.leaveRecords].sort((a,b)=>a.date<b.date?1:-1)}));
    setForm({date:'', type:'特休', days:'', hours:'', note:''});
    setHint({text:'已新增紀錄 ✓', warn:false});
    setTimeout(()=>setHint({text:'',warn:false}),1600);
  };

  const onDel=(id)=>setState(s=>({...s, leaveRecords:s.leaveRecords.filter(r=>r.id!==id)}));

    if(calcResult){
      setState(s=>({...s, leaveTotal: calcResult.totalDays}));

// views/calendar.jsx
function CalendarView({ state }) {
  const { leaveRecords, otRecords, cpRecords } = state;
  const [month, setMonth] = React.useState(new Date().getMonth());
  const [year] = React.useState(new Date().getFullYear());

  // build event map by date string
  const eventMap = React.useMemo(()=>{
    const m = {};
    leaveRecords.forEach(r=>{
      const key = r.date;
      m[key] = m[key] || [];
      m[key].push({kind:'leave', type:r.type, dur:(r.days>0?r.days+'d':'')+(r.hours>0?' '+r.hours+'h':'')});
    });
    otRecords.forEach(r=>{
      m[r.date] = m[r.date] || [];
      m[r.date].push({kind:'ot', settle:r.settle, dur:r.hours+'h'});
    });
    cpRecords.forEach(r=>{
      m[r.date] = m[r.date] || [];
      m[r.date].push({kind:'cp', dur:r.hours+'h'});
    });
    return m;
  }, [leaveRecords, otRecords, cpRecords]);

  const firstDay = new Date(year, month, 1);
  const daysInMonth = new Date(year, month+1, 0).getDate();
  const startWeekday = firstDay.getDay(); // 0=Sun

  // build cells
  const cells = [];
  for(let i=0;i<startWeekday;i++) cells.push(null);
  for(let d=1; d<=daysInMonth; d++) cells.push(d);
  while(cells.length%7!==0) cells.push(null);

  const pad = (n)=>String(n).padStart(2,'0');
  const today = new Date();

  // month totals
  const monthKeys = Object.keys(eventMap).filter(k=>{
    const dt = new Date(k+'T00:00:00');
    return dt.getFullYear()===year && dt.getMonth()===month;
  });
  let lvDays=0, otHrs=0, cpHrs=0;
  monthKeys.forEach(k=>eventMap[k].forEach(ev=>{
    if(ev.kind==='leave'){
      const d=parseFloat((ev.dur.match(/(\d+(?:\.\d+)?)d/)||[0,0])[1]);
      const h=parseFloat((ev.dur.match(/(\d+(?:\.\d+)?)h/)||[0,0])[1]);
      lvDays += d + h/8;
    }
    if(ev.kind==='ot') otHrs += parseFloat(ev.dur);
    if(ev.kind==='cp') cpHrs += parseFloat(ev.dur);
  }));

  const weekdays = ['日','一','二','三','四','五','六'];

  return (
    <div className="fade-in" style={{padding:'0 20px 20px', display:'flex', flexDirection:'column', gap:14}}>
      <div className="glass scale-in" style={{padding:'16px 16px 12px'}}>
        {/* header */}
        <div style={{display:'flex', alignItems:'center', justifyContent:'space-between', marginBottom:14}}>
          <button onClick={()=>setMonth(m=>m===0?11:m-1)} style={{
            background:'rgba(255,255,255,.05)', border:'1px solid rgba(255,255,255,.08)',
            width:34, height:34, borderRadius:10, cursor:'pointer',
            display:'flex', alignItems:'center', justifyContent:'center', color:'#fff',
          }}><Icon.Chevron width={14} height={14} style={{transform:'rotate(180deg)'}}/></button>
          <div>
            <div style={{fontSize:11, color:'rgba(255,255,255,.4)', letterSpacing:.3, textAlign:'center'}}>{year}</div>
            <div style={{fontSize:20, fontWeight:700, textAlign:'center', marginTop:2}}>{month+1} 月</div>
          </div>
          <button onClick={()=>setMonth(m=>m===11?0:m+1)} style={{
            background:'rgba(255,255,255,.05)', border:'1px solid rgba(255,255,255,.08)',
            width:34, height:34, borderRadius:10, cursor:'pointer',
            display:'flex', alignItems:'center', justifyContent:'center', color:'#fff',
          }}><Icon.Chevron width={14} height={14}/></button>
        </div>

        {/* weekdays */}
        <div style={{display:'grid', gridTemplateColumns:'repeat(7,1fr)', gap:4, marginBottom:6}}>
          {weekdays.map((w,i)=>(
            <div key={w} style={{
              textAlign:'center', fontSize:10, fontWeight:600,
              color: i===0||i===6 ? 'rgba(255,255,255,.35)' : 'rgba(255,255,255,.5)',
              letterSpacing:.5,
            }}>{w}</div>
          ))}
        </div>

        {/* grid */}
        <div style={{display:'grid', gridTemplateColumns:'repeat(7,1fr)', gap:4}}>
          {cells.map((d,i)=>{
            if(d===null) return <div key={i}/>;
            const key=`${year}-${pad(month+1)}-${pad(d)}`;
            const evs = eventMap[key] || [];
            const isToday = today.getFullYear()===year && today.getMonth()===month && today.getDate()===d;
            const isWeekend = i%7===0 || i%7===6;
            // dominant color
            const colors = evs.map(ev=>{
              if(ev.kind==='leave') return 'var(--chart-leave)';
              if(ev.kind==='ot')   return 'var(--chart-overtime)';
              if(ev.kind==='cp')   return 'var(--chart-comp)';
            });
            return (
              <div key={i} style={{
                aspectRatio:'1/1', borderRadius:10, position:'relative',
                display:'flex', flexDirection:'column', alignItems:'center', justifyContent:'center',
                background: evs.length>0 ? 'rgba(255,255,255,.05)' : 'transparent',
                border: isToday ? '1px solid var(--accent)' : '1px solid transparent',
                cursor: evs.length>0 ? 'pointer' : 'default',
                transition:'background .2s',
              }}>
                <div style={{
                  fontSize:13, fontWeight: isToday ? 700 : 500,
                  color: isToday ? 'var(--accent)'
                        : isWeekend ? 'rgba(255,255,255,.4)' : 'rgba(255,255,255,.8)',
                }}>{d}</div>
                {evs.length>0 && (
                  <div style={{display:'flex', gap:2, marginTop:3, height:4}}>
                    {colors.slice(0,3).map((c,j)=>(
                      <div key={j} style={{width:4, height:4, borderRadius:99, background:c, boxShadow:`0 0 4px ${c}`}}/>
                    ))}
                  </div>
                )}
              </div>
            );
          })}
        </div>
      </div>

      {/* legend */}
      <div className="glass" style={{padding:'12px 14px', display:'flex', justifyContent:'space-around', fontSize:11}}>
        {[
          {c:'var(--chart-leave)', label:'特休／假別'},
          {c:'var(--chart-overtime)', label:'加班'},
          {c:'var(--chart-comp)', label:'補休'},
        ].map(l=>(
          <div key={l.label} style={{display:'flex', alignItems:'center', gap:6, color:'rgba(255,255,255,.7)'}}>
            <span style={{width:8,height:8,borderRadius:99,background:l.c, boxShadow:`0 0 6px ${l.c}`}}/>
            {l.label}
          </div>
        ))}
      </div>

      {/* monthly summary */}
      <div>
        <SectionLabel>{month+1} 月統計</SectionLabel>
        <div style={{display:'grid', gridTemplateColumns:'repeat(3,1fr)', gap:10}}>
          <div className="glass" style={{padding:12, textAlign:'center'}}>
            <div style={{fontSize:10, color:'rgba(255,255,255,.5)'}}>請假</div>
            <div className="mono" style={{fontSize:22, fontWeight:700, marginTop:4, color:'var(--chart-leave)'}}>{DataUtil.f1(lvDays)}</div>
            <div style={{fontSize:10, color:'rgba(255,255,255,.4)'}}>天</div>
          </div>
          <div className="glass" style={{padding:12, textAlign:'center'}}>
            <div style={{fontSize:10, color:'rgba(255,255,255,.5)'}}>加班</div>
            <div className="mono" style={{fontSize:22, fontWeight:700, marginTop:4, color:'var(--chart-overtime)'}}>{DataUtil.f1(otHrs)}</div>
            <div style={{fontSize:10, color:'rgba(255,255,255,.4)'}}>小時</div>
          </div>
          <div className="glass" style={{padding:12, textAlign:'center'}}>
            <div style={{fontSize:10, color:'rgba(255,255,255,.5)'}}>補休</div>
            <div className="mono" style={{fontSize:22, fontWeight:700, marginTop:4, color:'var(--chart-comp)'}}>{DataUtil.f1(cpHrs)}</div>
            <div style={{fontSize:10, color:'rgba(255,255,255,.4)'}}>小時</div>
          </div>
        </div>
      </div>
    </div>
  );
}

window.CalendarView = CalendarView;

const STORAGE_KEY = 'leave_tracker_v2';

function loadSavedState() {
  try {
    const raw = localStorage.getItem(STORAGE_KEY);
    if (!raw) return null;
    return JSON.parse(raw);
  } catch(e) { return null; }
}

function saveState(state) {
  try {
    localStorage.setItem(STORAGE_KEY, JSON.stringify(state));
  } catch(e) {}
}

function loadSavedTheme() {
  return localStorage.getItem(STORAGE_THEME) || 'midnight';
}

function SettingsSheet({ theme, onThemeChange, onClear, onClose }) {
  return (
    <div style={{
      position:'absolute', inset:0, zIndex:50,
      background:'rgba(0,0,0,.6)', backdropFilter:'blur(8px)',
      display:'flex', flexDirection:'column', justifyContent:'flex-end',
      animation:'fadeIn .25s ease both',
    }} onClick={onClose}>
      <div className="glass" onClick={e=>e.stopPropagation()} style={{
        borderRadius:'24px 24px 0 0', padding:'20px 20px 40px',
        background:'rgba(20,20,40,.85)',
      }}>
        <div style={{width:36,height:4,borderRadius:2,background:'rgba(255,255,255,.2)',margin:'0 auto 20px'}}/>
        <SectionLabel>主題配色</SectionLabel>
        <div style={{display:'grid',gridTemplateColumns:'repeat(2,1fr)',gap:8,marginBottom:20}}>
          {Object.entries(THEMES).map(([k,t])=>(
            <button key={k} onClick={()=>onThemeChange(k)} style={{
              display:'flex', alignItems:'center', gap:10,
              padding:'10px 14px', borderRadius:12,
              background: theme===k ? 'rgba(255,255,255,.12)' : 'rgba(255,255,255,.04)',
              border: theme===k ? '1px solid rgba(255,255,255,.2)' : '1px solid rgba(255,255,255,.06)',
              color:'#fff', cursor:'pointer', fontSize:14,
            }}>
              <span style={{width:16,height:16,borderRadius:'50%',background:t.dot,flexShrink:0}}/>
              {t.name}
            </button>
          ))}
        </div>
        <SectionLabel>資料管理</SectionLabel>
        <button onClick={onClear} style={{
          width:'100%', padding:'12px',
          background:'rgba(255,60,80,.12)', border:'1px solid rgba(255,60,80,.3)',
          borderRadius:12, color:'#ff6b8a', fontSize:14, fontWeight:500,
          cursor:'pointer', fontFamily:'inherit',
        }}>清除所有資料</button>
      </div>
    </div>
  );
}

const EMPTY_STATE = { hireDate:'', leaveTotal:0, leaveRecords:[], otRecords:[], cpRecords:[] };

function App() {
  const [tab, setTab] = React.useState('dash');
  const [settingsOpen, setSettingsOpen] = React.useState(false);
  const [theme, setTheme] = React.useState(() => loadSavedTheme());

  const [state, setState] = React.useState(() => {
    const saved = loadSavedState();
    return saved || { ...EMPTY_STATE };
  });

  // persist state on every change
  React.useEffect(() => { saveState(state); }, [state]);
  // persist theme
  React.useEffect(() => {
    applyTheme(theme);
    localStorage.setItem(STORAGE_THEME, theme);
  }, [theme]);

  const handleClear = () => {
    if (!window.confirm('確定要清除所有假勤資料？此動作無法復原。')) return;
    setState({ ...EMPTY_STATE });
    setSettingsOpen(false);
  };

  const headers = {
    dash:  { title: '假勤總覽',  subtitle: '特休・加班・補休' },
    leave: { title: '特休管理',  subtitle: '年度假期配額' },
    ot:    { title: '加班紀錄',  subtitle: '加班時數統計' },
    comp:  { title: '補休使用',  subtitle: '補休餘額追蹤' },
    cal:   { title: '月曆',    subtitle: '年度假勤分布' },
  };
  const header = headers[tab];

  const viewEl = {
    dash:  <Dashboard    state={state} go={setTab}/>,
    leave: <LeaveView    state={state} setState={setState}/>,
    ot:    <OvertimeView state={state} setState={setState}/>,
    comp:  <CompView     state={state} setState={setState}/>,
    cal:   <CalendarView state={state}/>,
  }[tab];

  return (
    <div className="stage">
      <Phone>
        {settingsOpen && (
          <SettingsSheet
            theme={theme}
            onThemeChange={setTheme}
            onClear={handleClear}
            onClose={()=>setSettingsOpen(false)}
          />
        )}
        <AppHeader
          title={header.title}
          subtitle={header.subtitle}
          right={
            <button onClick={()=>setSettingsOpen(o=>!o)} style={{
              width:40, height:40, borderRadius:12,
              background:'rgba(255,255,255,.06)',
              border:'1px solid rgba(255,255,255,.08)',
              display:'flex', alignItems:'center', justifyContent:'center',
              color:'rgba(255,255,255,.7)', cursor:'pointer',
            }}>
              <Icon.Gear width={18} height={18}/>
            </button>
          }
        />
        <div className="phone-scroll" style={{flex:1, overflowY:'auto', overflowX:'hidden'}}>
          <div key={tab}>{viewEl}</div>
        </div>
        <TabBar active={tab} onChange={setTab}/>
      </Phone>
    </div>
  );
}

// init theme immediately
applyTheme(loadSavedTheme());

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);

if ('serviceWorker' in navigator) {
  navigator.serviceWorker.register('/sw.js');
}



  
</script>
</body>
</html>
